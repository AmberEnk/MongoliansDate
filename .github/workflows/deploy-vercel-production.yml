# Optional: deploy via Actions when Vercel’s “GitHub app” path isn’t used.
# Requires repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — https://vercel.com/account/tokens (create; do not reuse DB URLs)
#   VERCEL_ORG_ID      — Vercel → Project → Settings → General → Team ID
#   VERCEL_PROJECT_ID  — same page → Project ID
#
# Trigger: manual only by default so pushes don’t fail when VERCEL_TOKEN isn’t set.
# Vercel’s own “Import Git” deploys on push separately. After you add VERCEL_TOKEN,
# you may re-enable `push: branches: [main]` below if you want Actions + Git deploys.

name: Deploy to Vercel (production)

on:
  workflow_dispatch:

concurrency:
  group: vercel-production-${{ github.repository }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Require Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::Missing GitHub secret VERCEL_TOKEN. Create one at https://vercel.com/account/tokens then add it under Settings → Secrets and variables → Actions (same repo)."
            exit 1
          fi
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "::error::Missing VERCEL_ORG_ID or VERCEL_PROJECT_ID secrets."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build (Vercel)
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
